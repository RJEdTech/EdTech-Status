name: Fetch IXL status

on:
  schedule:
    # Every 5 minutes. GitHub may delay scheduled runs during high load,
    # so actual cadence can be 5-15 minutes — fine for our purposes.
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual runs from the Actions tab

permissions:
  contents: write  # Needed to commit the updated JSON file

jobs:
  fetch-ixl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and parse IXL status page
        run: |
          node <<'EOF'
          const https = require('https');
          const fs = require('fs');

          const PAGE_URL = 'https://status.ixl.com/';
          const OUT_PATH = 'ixl.json';

          function fetchUrl(url) {
            return new Promise((resolve, reject) => {
              https.get(url, { headers: { 'User-Agent': 'rjedtech-status-dashboard' } }, (res) => {
                if (res.statusCode !== 200) {
                  reject(new Error('HTTP ' + res.statusCode));
                  return;
                }
                let body = '';
                res.on('data', (chunk) => body += chunk);
                res.on('end', () => resolve(body));
              }).on('error', reject);
            });
          }

          // Detection logic: status.ixl.com is hosted on Uptime.com, which renders
          // the status data server-side as a JavaScript object literal passed to
          // a React controller. The relevant snippet looks like:
          //
          //   createElement(StatusPageDisplayController, {... "statuspage": {...
          //     "global_is_operational": true,
          //     "has_components_under_maintenance_state": false,
          //     "has_components_under_critical_state": false,
          //     "active_incidents": [...],
          //     "components": [{"name": "IXL", "status": "operational", ...}],
          //     ...
          //   }})
          //
          // We don't try to parse the entire object (it's deeply nested and not
          // strictly valid JSON in isolation). We extract the keys we care
          // about with focused regex. If any required key is missing, we exit 1 —
          // a loud failure is better than silently writing wrong data.
          //
          // Mapping to the dashboard's severity levels:
          //   - has_components_under_critical_state=true   -> 'major' (red)
          //   - has_components_under_maintenance_state=true -> 'maintenance' (yellow)
          //   - global_is_operational=false (and not above) -> 'partial' (orange)
          //   - global_is_operational=true                  -> 'operational' (green)

          function parseStatus(html) {
            const opMatch = html.match(/"global_is_operational":\s*(true|false)/);
            const maintMatch = html.match(/"has_components_under_maintenance_state":\s*(true|false)/);
            const critMatch = html.match(/"has_components_under_critical_state":\s*(true|false)/);
            const incidentsMatch = html.match(/"active_incidents":\s*(\[[\s\S]*?\])\s*,\s*"upcoming_maintenance"/);

            if (!opMatch || !maintMatch || !critMatch) {
              throw new Error('Could not find expected status flags in page HTML — Uptime.com may have changed their page structure.');
            }

            const isOperational = opMatch[1] === 'true';
            const isMaintenance = maintMatch[1] === 'true';
            const isCritical = critMatch[1] === 'true';

            // Try to count incidents (defensive — incidents array may be empty)
            let incidentCount = 0;
            let firstIncidentName = '';
            if (incidentsMatch) {
              const incidentsRaw = incidentsMatch[1];
              // Count "id" keys as a proxy for incident count
              const ids = incidentsRaw.match(/"id"\s*:/g);
              incidentCount = ids ? ids.length : 0;
              // Try to grab the first incident's name for display
              const nameMatch = incidentsRaw.match(/"name"\s*:\s*"([^"]+)"/);
              if (nameMatch) firstIncidentName = nameMatch[1];
            }

            let severity;
            if (isCritical) severity = 'major';
            else if (isMaintenance) severity = 'maintenance';
            else if (!isOperational) severity = 'partial';
            else severity = 'operational';

            return {
              severity,
              isOperational,
              isMaintenance,
              isCritical,
              incidentCount,
              firstIncidentName
            };
          }

          (async () => {
            // Helper: read existing snapshot if present
            function readExisting() {
              if (!fs.existsSync(OUT_PATH)) return null;
              try {
                return JSON.parse(fs.readFileSync(OUT_PATH, 'utf8'));
              } catch (_) {
                return null;
              }
            }

            // Helper: compare two objects' content fields (ignoring volatile timestamps)
            function contentEqual(a, b) {
              if (!a || !b) return false;
              const fields = ['source', 'severity', 'isOperational', 'isMaintenance',
                              'isCritical', 'incidentCount', 'firstIncidentName',
                              'parseError', 'lastSuccessfulParse'];
              return fields.every(f => JSON.stringify(a[f]) === JSON.stringify(b[f]));
            }

            const existing = readExisting();

            try {
              const html = await fetchUrl(PAGE_URL);
              const parsed = parseStatus(html);

              const now = new Date().toISOString();
              const newContent = {
                source: PAGE_URL,
                severity: parsed.severity,
                isOperational: parsed.isOperational,
                isMaintenance: parsed.isMaintenance,
                isCritical: parsed.isCritical,
                incidentCount: parsed.incidentCount,
                firstIncidentName: parsed.firstIncidentName,
                parseError: null,            // explicitly cleared on success
                lastSuccessfulParse: now     // updated on every successful parse
              };

              if (contentEqual(newContent, existing)) {
                console.log('No content change — skipping write. Current severity:', parsed.severity);
                return;
              }

              const snapshot = { fetchedAt: now, ...newContent };
              fs.writeFileSync(OUT_PATH, JSON.stringify(snapshot, null, 2) + '\n');
              console.log('Status content changed — wrote', OUT_PATH);
              console.log(JSON.stringify(snapshot, null, 2));
            } catch (err) {
              // Don't lose the last-known status. Preserve everything from the last good
              // fetch and layer parseError on top so the dashboard can flag the breakage
              // while still showing the most recent valid reading.
              console.error('Failed to fetch/parse IXL status page:', err.message);

              const now = new Date().toISOString();
              const lastGood = existing || {};
              const newContent = {
                source: PAGE_URL,
                severity: lastGood.severity || 'unknown',
                isOperational: lastGood.isOperational ?? null,
                isMaintenance: lastGood.isMaintenance ?? null,
                isCritical: lastGood.isCritical ?? null,
                incidentCount: lastGood.incidentCount ?? 0,
                firstIncidentName: lastGood.firstIncidentName || '',
                parseError: {
                  message: err.message,
                  firstFailedAt: (lastGood.parseError && lastGood.parseError.firstFailedAt) || now
                },
                lastSuccessfulParse: lastGood.lastSuccessfulParse || null
              };

              // Only commit if the breakage state itself changed (don't spam commits
              // every 5 minutes during a sustained outage of the scraper itself)
              if (contentEqual(newContent, existing)) {
                console.log('Parse still failing with same error — skipping write.');
                return;
              }

              const snapshot = { fetchedAt: now, ...newContent };
              fs.writeFileSync(OUT_PATH, JSON.stringify(snapshot, null, 2) + '\n');
              console.log('Wrote breakage snapshot to', OUT_PATH);
              console.log(JSON.stringify(snapshot, null, 2));
              // Don't exit 1 here — we need the commit step to run so the breakage
              // state actually gets pushed. A separate step at the end of the job
              // checks the resulting JSON and fails the workflow run if parseError
              // is set, which keeps the GitHub Actions red X for alerting.
            }
          })();
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ixl.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update IXL status snapshot [skip ci]"
            git push
          fi

      - name: Fail run if scraper is broken
        # This step exists so the GitHub Actions run shows red whenever the
        # scraper can't parse the page, even though we wrote the breakage state
        # to JSON in a clean exit (so the commit step could run). The dashboard
        # surfaces breakage from the JSON; this step exists for GitHub-side alerting.
        run: |
          if [ -f ixl.json ] && grep -q '"parseError": {' ixl.json; then
            echo "::error::IXL scraper failed to parse the page. See ixl.json for details."
            cat ixl.json
            exit 1
          fi
          echo "IXL scraper succeeded."
