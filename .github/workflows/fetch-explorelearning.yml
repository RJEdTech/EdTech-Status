name: Fetch ExploreLearning status

on:
  schedule:
    # Every 5 minutes. GitHub may delay scheduled runs during high load,
    # so actual cadence can be 5-15 minutes — fine for our purposes.
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual runs from the Actions tab

permissions:
  contents: write  # Needed to commit the updated JSON file

jobs:
  fetch-explorelearning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and parse ExploreLearning status page
        run: |
          node <<'EOF'
          const https = require('https');
          const fs = require('fs');

          const PAGE_URL = 'https://www.explorelearning.com/our-products/site-status';
          const OUT_PATH = 'explorelearning.json';

          function fetchUrl(url) {
            return new Promise((resolve, reject) => {
              https.get(url, { headers: { 'User-Agent': 'rjedtech-status-dashboard' } }, (res) => {
                if (res.statusCode !== 200) {
                  reject(new Error('HTTP ' + res.statusCode));
                  return;
                }
                let body = '';
                res.on('data', (chunk) => body += chunk);
                res.on('end', () => resolve(body));
              }).on('error', reject);
            });
          }

          // Detection logic: ExploreLearning's page has two known states.
          //
          //   "A-OK" state (operational) — the page contains:
          //     - an element with id="site-status-a-ok"
          //     - the heading "A-OK!" inside <p class="h1 xbold mb-0 text-green">
          //     - text: "All ExploreLearning sites are currently working with no issues."
          //
          //   "Issue reported" — id marker present but no green text. We don't try
          //   to parse incident details (no confirmed example of the down-state HTML),
          //   but the presence of the id confirms we're still on the right page.
          //
          //   "Page unrecognized" — neither marker present. Either the URL changed,
          //   the page was redesigned, or we got a different page entirely (e.g.
          //   a redirect to a marketing page). This is breakage, not an outage.
          //
          // We require BOTH the id and the green-text marker for "operational" so a
          // partial page load or unrelated HTML change doesn't false-positive.

          function detectStatus(html) {
            const hasOkId = /id=["']site-status-a-ok["']/i.test(html);
            const hasGreenAOk = /class=["'][^"']*text-green[^"']*["'][^>]*>\s*A-OK!/i.test(html);
            if (hasOkId && hasGreenAOk) return 'operational';
            if (hasOkId) return 'check_page';
            // Neither marker — we don't recognize this page. Throw so the outer
            // catch treats it as breakage.
            throw new Error('Neither operational marker nor id="site-status-a-ok" found on the page — ExploreLearning may have redesigned the status page or changed the URL.');
          }

          (async () => {
            // Helper: read existing snapshot if present
            function readExisting() {
              if (!fs.existsSync(OUT_PATH)) return null;
              try {
                return JSON.parse(fs.readFileSync(OUT_PATH, 'utf8'));
              } catch (_) {
                return null;
              }
            }

            // Helper: compare two objects' content fields (ignoring volatile timestamps)
            function contentEqual(a, b) {
              if (!a || !b) return false;
              const fields = ['source', 'status', 'parseError', 'lastSuccessfulParse'];
              return fields.every(f => JSON.stringify(a[f]) === JSON.stringify(b[f]));
            }

            const existing = readExisting();

            try {
              const html = await fetchUrl(PAGE_URL);
              const status = detectStatus(html);

              const now = new Date().toISOString();
              const newContent = {
                source: PAGE_URL,
                status: status,
                parseError: null,            // explicitly cleared on success
                lastSuccessfulParse: now     // updated on every successful parse
              };

              if (contentEqual(newContent, existing)) {
                console.log('No content change — skipping write. Current status:', status);
                return;
              }

              const snapshot = { fetchedAt: now, ...newContent };
              fs.writeFileSync(OUT_PATH, JSON.stringify(snapshot, null, 2) + '\n');
              console.log('Status content changed — wrote', OUT_PATH);
              console.log(JSON.stringify(snapshot, null, 2));
            } catch (err) {
              console.error('Failed to fetch/parse ExploreLearning status page:', err.message);

              const now = new Date().toISOString();
              const lastGood = existing || {};
              const newContent = {
                source: PAGE_URL,
                status: lastGood.status || 'unknown',
                parseError: {
                  message: err.message,
                  firstFailedAt: (lastGood.parseError && lastGood.parseError.firstFailedAt) || now
                },
                lastSuccessfulParse: lastGood.lastSuccessfulParse || null
              };

              if (contentEqual(newContent, existing)) {
                console.log('Parse still failing with same error — skipping write.');
                return;
              }

              const snapshot = { fetchedAt: now, ...newContent };
              fs.writeFileSync(OUT_PATH, JSON.stringify(snapshot, null, 2) + '\n');
              console.log('Wrote breakage snapshot to', OUT_PATH);
              console.log(JSON.stringify(snapshot, null, 2));
            }
          })();
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add explorelearning.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update ExploreLearning status snapshot [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push failed (attempt $i) — pulling and retrying"
            git pull --rebase origin main
            sleep $((RANDOM % 5 + 1))
          done
          echo "::error::Failed to push after 5 attempts"
          exit 1

      - name: Fail run if scraper is broken
        # This step exists so the GitHub Actions run shows red whenever the
        # scraper can't recognize the page, even though we wrote the breakage state
        # to JSON in a clean exit (so the commit step could run). The dashboard
        # surfaces breakage from the JSON; this step exists for GitHub-side alerting.
        run: |
          if [ -f explorelearning.json ] && grep -q '"parseError": {' explorelearning.json; then
            echo "::error::ExploreLearning scraper failed to recognize the page. See explorelearning.json for details."
            cat explorelearning.json
            exit 1
          fi
          echo "ExploreLearning scraper succeeded."
