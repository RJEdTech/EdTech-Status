name: Fetch Quizizz status

on:
  schedule:
    # Every 5 minutes. GitHub may delay scheduled runs during high load,
    # so actual cadence can be 5-15 minutes — fine for our purposes.
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual runs from the Actions tab

permissions:
  contents: write  # Needed to commit the updated JSON file

jobs:
  fetch-quizizz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Probe Wayground reachability
        run: |
          node <<'EOF'
          const https = require('https');
          const fs = require('fs');

          // -----------------------------------------------------------------
          // Why this is a reachability probe and not a status-page scraper:
          //
          // Quizizz/Wayground's old Freshping status page
          // (statuspage.freshping.io/621-QuizizzStatusPage) was decommissioned in
          // June 2026 — it now returns "Status page for domain name does not exist."
          // Freshworks has been retiring legacy Freshping public pages, and there is
          // no public, machine-readable first-party Wayground status page to point at.
          //
          // So instead of reading a vendor banner (which, even when it existed, often
          // read green while teachers were locked out), we probe the thing teachers
          // actually care about: can a browser reach the student join page right now.
          // We classify by HTTP response, not by matching English banner text, so this
          // does not break on rebrands or layout changes.
          //
          // Limitation (same as our other probes): this runs from GitHub's runners
          // (US/Azure egress), so it catches vendor-side outages but NOT an
          // RJ-network or Securly-filter issue. That's a known, accepted gap.
          // -----------------------------------------------------------------
          const PROBE_URL    = 'https://wayground.com/join';
          const OUT_PATH     = 'quizizz.json';
          const ATTEMPTS     = 3;      // best-of, to dampen single-request runner blips
          const TIMEOUT_MS   = 10000;  // per attempt
          const MAX_REDIRECTS = 5;

          // Browser-like UA on purpose: we're simulating a student's browser reaching
          // the join page. A bot-ish UA risks a CDN 403 that would look like an outage
          // when it isn't.
          const UA = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 ' +
                     '(KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36';

          // One HTTP probe. Resolves { status } on any HTTP response (following
          // redirects up to MAX_REDIRECTS), rejects on network error / timeout.
          // We only need the status line, so we tear down the socket immediately.
          function probeOnce(url, redirectsLeft) {
            return new Promise((resolve, reject) => {
              const req = https.get(
                url,
                { headers: { 'User-Agent': UA, 'Accept': 'text/html' } },
                (res) => {
                  const status = res.statusCode;
                  if (status >= 300 && status < 400 && res.headers.location && redirectsLeft > 0) {
                    res.destroy();
                    let next;
                    try {
                      next = new URL(res.headers.location, url).toString();
                    } catch (e) {
                      resolve({ status }); // malformed redirect target; report the 3xx as-is
                      return;
                    }
                    resolve(probeOnce(next, redirectsLeft - 1));
                    return;
                  }
                  res.destroy(); // don't download the body — we only want the status
                  resolve({ status });
                }
              );
              req.setTimeout(TIMEOUT_MS, () => {
                req.destroy(new Error('timeout after ' + TIMEOUT_MS + 'ms'));
              });
              req.on('error', reject);
            });
          }

          // Classify one completed attempt into a dashboard-facing outcome.
          //   { kind: 'status', severity, detail }  — a real reading we can publish
          //   { kind: 'probeError', detail }         — the origin answered but not
          //                                            usefully (a stale-URL 4xx);
          //                                            surfaces as breakage + red run.
          function classifyAttempt(result) {
            const s = result.status;
            if (s >= 200 && s < 400) return { kind: 'status', severity: 'operational', detail: 'HTTP ' + s };
            if (s === 429)           return { kind: 'status', severity: 'degraded',    detail: 'HTTP 429 (rate limited)' };
            if (s >= 500)            return { kind: 'status', severity: 'major',       detail: 'HTTP ' + s };
            // Remaining 4xx (401/403/404/405/…): the origin responded, so it's
            // reachable — but /join isn't giving a liveness answer. Far more likely
            // our probe URL moved than a total outage. Flag as a probe problem so the
            // run goes red and we fix the URL, rather than crying "Wayground down."
            return { kind: 'probeError', detail: 'HTTP ' + s };
          }

          // Rank for best-of selection across attempts. Lower = preferred.
          // Ordering rationale: ANY HTTP response proves the origin is reachable, so
          // a reachable-but-wrong-URL result (probeError) outranks "unreachable"
          // (major). operational/degraded outrank everything real.
          function outcomeRank(o) {
            if (o.kind === 'probeError') return 2;
            switch (o.severity) {
              case 'operational': return 0;
              case 'degraded':    return 1;
              case 'major':       return 3;
              default:            return 3;
            }
          }

          (async () => {
            function readExisting() {
              if (!fs.existsSync(OUT_PATH)) return null;
              try { return JSON.parse(fs.readFileSync(OUT_PATH, 'utf8')); }
              catch (_) { return null; }
            }

            // Only material fields decide whether we commit — timestamps are
            // bookkeeping. This keeps us from committing every 5 minutes when
            // nothing has actually changed.
            function contentEqual(a, b) {
              if (!a || !b) return false;
              const fields = ['source', 'severity', 'detail', 'parseError'];
              return fields.every(f => JSON.stringify(a[f]) === JSON.stringify(b[f]));
            }

            function writeIfChanged(newContent, existing, now) {
              if (contentEqual(newContent, existing)) {
                console.log('No material change — skipping write. severity=' +
                  newContent.severity + (newContent.parseError ? ' (probe error)' : '') +
                  ' detail=' + newContent.detail);
                return;
              }
              const snapshot = { fetchedAt: now, ...newContent };
              fs.writeFileSync(OUT_PATH, JSON.stringify(snapshot, null, 2) + '\n');
              console.log('Wrote ' + OUT_PATH);
              console.log(JSON.stringify(snapshot, null, 2));
            }

            const existing = readExisting();

            // Run best-of-N probes and keep the preferred outcome.
            const outcomes = [];
            for (let i = 0; i < ATTEMPTS; i++) {
              try {
                const r = await probeOnce(PROBE_URL, MAX_REDIRECTS);
                outcomes.push(classifyAttempt(r));
              } catch (e) {
                // No HTTP response at all (DNS/refused/timeout) — a genuine
                // "can't reach it" signal.
                outcomes.push({ kind: 'status', severity: 'major', detail: (e && e.message) || 'network error' });
              }
            }
            outcomes.sort((a, b) => outcomeRank(a) - outcomeRank(b));
            const best = outcomes[0];

            const now = new Date().toISOString();

            if (best.kind === 'probeError') {
              // Our probe target needs attention — retain last real reading.
              const lastGood = existing || {};
              const newContent = {
                source: PROBE_URL,
                severity: lastGood.severity || 'unknown',
                detail: best.detail,
                parseError: {
                  message: 'Probe target returned ' + best.detail +
                           ' — wayground.com/join may have moved. Update PROBE_URL in fetch-quizizz.yml.',
                  firstFailedAt: (lastGood.parseError && lastGood.parseError.firstFailedAt) || now
                },
                lastSuccessfulParse: lastGood.lastSuccessfulParse || null
              };
              writeIfChanged(newContent, existing, now);
              return;
            }

            // Real reading (operational | degraded | major). Keep lastSuccessfulParse
            // pinned to when the CURRENT reading first appeared, so a later breakage
            // can report "reachable since <t>" / "down since <t>" accurately.
            const readingUnchanged = existing && !existing.parseError &&
                                     existing.severity === best.severity &&
                                     existing.detail === best.detail;
            const lastSuccessfulParse = readingUnchanged ? existing.lastSuccessfulParse : now;

            const newContent = {
              source: PROBE_URL,
              severity: best.severity,
              detail: best.detail,
              parseError: null,
              lastSuccessfulParse: lastSuccessfulParse
            };
            writeIfChanged(newContent, existing, now);
          })();
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add quizizz.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Quizizz reachability snapshot [skip ci]"
            git push
          fi

      - name: Fail run if probe target is broken
        # Goes red only when OUR probe needs fixing (a stale-URL 4xx), which we
        # record as a parseError. A real Wayground outage is a normal detected
        # state (severity "major") and deliberately does NOT fail the run.
        run: |
          if [ -f quizizz.json ] && grep -q '"parseError": {' quizizz.json; then
            echo "::error::Quizizz probe target returned a 4xx. wayground.com/join may have moved. See quizizz.json."
            cat quizizz.json
            exit 1
          fi
          echo "Quizizz probe OK."