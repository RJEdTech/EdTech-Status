name: Fetch MyRJ status

on:
  schedule:
    # Every 5 minutes. GitHub may delay scheduled runs during high load,
    # so actual cadence can be 5-15 minutes — fine for our purposes.
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual runs from the Actions tab

permissions:
  contents: write  # Needed to commit the updated JSON file

jobs:
  fetch-myrj:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Synthetic check on MyRJ faculty login
        run: |
          node <<'EOF'
          const https = require('https');
          const fs = require('fs');
          const { URL } = require('url');

          // Synthetic check on the MyRJ faculty login flow.
          //
          // The login flow has three layers, each owned by a different vendor:
          //   1. regisjesuit.myschoolapp.com  — Blackbaud's tenant for RJ
          //   2. app.blackbaud.com/signin     — Blackbaud ID (their global B2C)
          //   3. login.microsoftonline.com    — Microsoft Entra (RJ's tenant)
          //
          // Layer 3 is already covered by the Microsoft 365 tile, so we
          // intentionally STOP at layer 2. This avoids double-counting M365
          // sign-in outages on this tile. The unique signal this tile adds is
          // RJ-tenant-specific health PLUS the Blackbaud-Microsoft federation
          // handoff — failure modes the global Blackbaud status page may not
          // catch.
          //
          // Severity ceiling: 'partial' (orange). Per Jason: when MyRJ is
          // down, faculty workaround is "email attendance to the Dean's
          // office" — friction, not a stoppage. Reserving 'major' (red)
          // for events with no workaround at all.
          //
          // Behavior: the start URL bounces unauthenticated visitors to
          // app.blackbaud.com/signin/?login_hint=...&redirectUrl=...
          // We follow that redirect and verify the Blackbaud sign-in page
          // loaded. We do NOT follow the further redirect to Microsoft —
          // the M365 tile already covers that.
          const START_URL = 'https://regisjesuit.myschoolapp.com/app/faculty?svcid=edu';
          const VERIFY_STRING_HOST = 'app.blackbaud.com';   // we should land on Blackbaud's sign-in
          const OUT_PATH = 'myrj.json';
          const TIMEOUT_MS = 15000;
          const MAX_REDIRECTS = 3;  // tight cap — we expect 1-2 hops to Blackbaud
          const USER_AGENT = 'rjedtech-status-dashboard (https://rjedtech.github.io/EdTech-Status/)';

          // Fetch ONE hop. We control redirect-following manually so we can
          // stop at app.blackbaud.com without continuing into Microsoft.
          function fetchOnce(targetUrl) {
            return new Promise((resolve) => {
              let parsedUrl;
              try {
                parsedUrl = new URL(targetUrl);
              } catch (err) {
                resolve({ ok: false, status: 0, body: '', error: 'Invalid URL: ' + err.message, location: null });
                return;
              }
              const opts = {
                method: 'GET',
                headers: {
                  'User-Agent': USER_AGENT,
                  'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                  'Accept-Language': 'en-US,en;q=0.9'
                },
                timeout: TIMEOUT_MS
              };
              const req = https.get(parsedUrl, opts, (res) => {
                let body = '';
                const MAX_BODY = 200000;
                res.on('data', (chunk) => {
                  if (body.length < MAX_BODY) {
                    body += chunk.toString('utf8');
                    if (body.length > MAX_BODY) body = body.slice(0, MAX_BODY);
                  }
                });
                res.on('end', () => {
                  resolve({
                    ok: res.statusCode >= 200 && res.statusCode < 400,
                    status: res.statusCode,
                    body,
                    error: null,
                    location: res.headers.location || null,
                    finalUrl: parsedUrl.toString()
                  });
                });
              });
              req.on('error', (err) => resolve({ ok: false, status: 0, body: '', error: err.message, location: null }));
              req.on('timeout', () => req.destroy(new Error('Request timed out after ' + TIMEOUT_MS + 'ms')));
            });
          }

          // Walk the redirect chain manually, but bail out the moment we
          // land on app.blackbaud.com — that's our target. If we never
          // reach Blackbaud, that's a failure mode worth surfacing.
          async function followToBlackbaud(startUrl) {
            const chain = [];
            let currentUrl = startUrl;
            for (let i = 0; i < MAX_REDIRECTS + 1; i++) {
              const res = await fetchOnce(currentUrl);
              chain.push({ url: currentUrl, status: res.status, error: res.error });
              if (res.error) {
                return { ok: false, error: res.error, chain, finalRes: res };
              }
              const isRedirect = [301, 302, 303, 307, 308].includes(res.status);
              const landedOnTarget = currentUrl.includes(VERIFY_STRING_HOST);

              // If we've landed on the Blackbaud sign-in host with a 200,
              // we're done — return success.
              if (landedOnTarget && res.status >= 200 && res.status < 300) {
                return { ok: true, chain, finalRes: res };
              }
              // If we landed on Blackbaud but got an error status, that's
              // a real problem at Blackbaud's sign-in.
              if (landedOnTarget && res.status >= 400) {
                return { ok: false, error: 'Blackbaud sign-in returned HTTP ' + res.status, chain, finalRes: res };
              }
              // Not yet on target; if there's a redirect, follow it.
              if (isRedirect && res.location) {
                currentUrl = new URL(res.location, currentUrl).toString();
                continue;
              }
              // No more redirects, never reached target — that's a problem.
              return { ok: false, error: 'Did not reach ' + VERIFY_STRING_HOST + ' after ' + (i + 1) + ' hop(s)', chain, finalRes: res };
            }
            return { ok: false, error: 'Exceeded max redirects (' + MAX_REDIRECTS + ')', chain, finalRes: null };
          }

          (async () => {
            function readExisting() {
              if (!fs.existsSync(OUT_PATH)) return null;
              try { return JSON.parse(fs.readFileSync(OUT_PATH, 'utf8')); } catch (_) { return null; }
            }
            function contentEqual(a, b) {
              if (!a || !b) return false;
              if (a.severity !== b.severity) return false;
              if (a.statusLabel !== b.statusLabel) return false;
              if (JSON.stringify(a.parseError) !== JSON.stringify(b.parseError)) return false;
              return true;
            }
            const existing = readExisting();

            try {
              console.log('--- Checking', START_URL);
              const result = await followToBlackbaud(START_URL);
              console.log('  Redirect chain:');
              for (const hop of result.chain) {
                console.log('    ' + hop.status + ' ' + hop.url + (hop.error ? ' (ERROR: ' + hop.error + ')' : ''));
              }

              let severity, statusLabel, statusDetail;

              if (result.ok) {
                severity = 'operational';
                statusLabel = 'Operating normally';
                statusDetail = null;
              } else {
                // Differentiate types of failure for clearer messaging
                const finalRes = result.finalRes;
                if (finalRes && finalRes.error) {
                  // Network-level failure
                  severity = 'partial';
                  statusLabel = 'Unreachable';
                  statusDetail = finalRes.error;
                } else if (finalRes && finalRes.status >= 500) {
                  severity = 'partial';
                  statusLabel = 'Server error';
                  statusDetail = 'HTTP ' + finalRes.status;
                } else if (finalRes && finalRes.status >= 400) {
                  severity = 'partial';
                  statusLabel = 'Login broken';
                  statusDetail = 'HTTP ' + finalRes.status;
                } else {
                  // Got responses but never hit Blackbaud — federation issue
                  severity = 'degraded';
                  statusLabel = 'Unexpected redirect path';
                  statusDetail = result.error;
                }
              }

              console.log('--- Severity:', severity, '-', statusLabel);

              const now = new Date().toISOString();
              const newContent = {
                source: 'synthetic-check',
                target: START_URL,
                severity,
                statusLabel,
                statusDetail,
                parseError: null,
                lastSuccessfulParse: now
              };

              if (contentEqual(newContent, existing)) {
                console.log('No content change — skipping write.');
                return;
              }

              const snapshot = { fetchedAt: now, ...newContent };
              fs.writeFileSync(OUT_PATH, JSON.stringify(snapshot, null, 2) + '\n');
              console.log('Wrote', OUT_PATH);
              console.log(JSON.stringify(snapshot, null, 2));
            } catch (err) {
              console.error('Workflow harness failed:', err.message);
              const now = new Date().toISOString();
              const lastGood = existing || {};
              const newContent = {
                source: 'synthetic-check',
                target: START_URL,
                severity: lastGood.severity || 'unknown',
                statusLabel: lastGood.statusLabel || null,
                statusDetail: lastGood.statusDetail || null,
                parseError: {
                  message: err.message,
                  firstFailedAt: (lastGood.parseError && lastGood.parseError.firstFailedAt) || now
                },
                lastSuccessfulParse: lastGood.lastSuccessfulParse || null
              };
              if (contentEqual(newContent, existing)) {
                console.log('Workflow still failing with same error — skipping write.');
                return;
              }
              const snapshot = { fetchedAt: now, ...newContent };
              fs.writeFileSync(OUT_PATH, JSON.stringify(snapshot, null, 2) + '\n');
              console.log('Wrote breakage snapshot to', OUT_PATH);
            }
          })();
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add myrj.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update MyRJ status snapshot [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push failed (attempt $i) — pulling and retrying"
            git pull --rebase origin main
            sleep $((RANDOM % 5 + 1))
          done
          echo "::error::Failed to push after 5 attempts"
          exit 1

      - name: Fail run if scraper harness is broken
        run: |
          if [ -f myrj.json ] && grep -q '"parseError": {' myrj.json; then
            echo "::error::MyRJ scraper harness failed."
            cat myrj.json
            exit 1
          fi
          echo "MyRJ scraper succeeded."
