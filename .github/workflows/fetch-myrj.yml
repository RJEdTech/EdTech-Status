name: Fetch MyRJ status

on:
  schedule:
    # Every 5 minutes. GitHub may delay scheduled runs during high load,
    # so actual cadence can be 5-15 minutes — fine for our purposes.
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual runs from the Actions tab

permissions:
  contents: write  # Needed to commit the updated JSON file

jobs:
  fetch-myrj:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Synthetic check on MyRJ faculty login
        run: |
          node <<'EOF'
          const https = require('https');
          const fs = require('fs');
          const { URL } = require('url');

          // Synthetic check on the MyRJ faculty login flow.
          //
          // Blackbaud's tenant URL serves a 200 OK directly with HTML that
          // bootstraps the auth flow client-side via JavaScript — there's no
          // server-side redirect to follow. So we make a single GET and
          // verify the response is OUR tenant's HTML (not an error page,
          // not a different tenant's content, not a maintenance shell).
          //
          // Verify string: 'apple-mobile-web-app-title" content="RJHS"'
          // This is RJ-tenant-specific Blackbaud config — it identifies
          // the school as RJHS (Regis Jesuit High School) and is stable
          // configuration that wouldn't change without an admin action.
          //
          // What this catches:
          //   - regisjesuit.myschoolapp.com unreachable / DNS failure
          //   - 5xx errors at Blackbaud's tenant infrastructure
          //   - Wrong tenant served (would land in 'degraded' state — RJHS
          //     marker missing means something served but not OUR content)
          //
          // What this DOESN'T catch:
          //   - Microsoft sign-in failures (covered by Microsoft 365 tile)
          //   - Blackbaud-Microsoft federation handoff (would require a
          //     headless browser to follow client-side redirects)
          //   - Post-login application bugs
          //
          // Severity ceiling: 'partial' (orange). When MyRJ is down, faculty
          // workaround is "email attendance to the Dean's office" — friction,
          // not a stoppage. Reserving 'major' (red) for events with no
          // workaround at all.
          const TARGET_URL = 'https://regisjesuit.myschoolapp.com/app/faculty?svcid=edu';
          const VERIFY_STRING = 'apple-mobile-web-app-title" content="RJHS"';
          const OUT_PATH = 'myrj.json';
          const TIMEOUT_MS = 15000;
          const USER_AGENT = 'rjedtech-status-dashboard (https://rjedtech.github.io/EdTech-Status/)';

          function fetchUrl(targetUrl) {
            return new Promise((resolve) => {
              let parsedUrl;
              try {
                parsedUrl = new URL(targetUrl);
              } catch (err) {
                resolve({ ok: false, status: 0, body: '', error: 'Invalid URL: ' + err.message });
                return;
              }
              const opts = {
                method: 'GET',
                headers: {
                  'User-Agent': USER_AGENT,
                  'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                  'Accept-Language': 'en-US,en;q=0.9'
                },
                timeout: TIMEOUT_MS
              };
              const req = https.get(parsedUrl, opts, (res) => {
                let body = '';
                const MAX_BODY = 200000;
                res.on('data', (chunk) => {
                  if (body.length < MAX_BODY) {
                    body += chunk.toString('utf8');
                    if (body.length > MAX_BODY) body = body.slice(0, MAX_BODY);
                  }
                });
                res.on('end', () => {
                  resolve({
                    ok: res.statusCode >= 200 && res.statusCode < 400,
                    status: res.statusCode,
                    body,
                    error: null
                  });
                });
              });
              req.on('error', (err) => resolve({ ok: false, status: 0, body: '', error: err.message }));
              req.on('timeout', () => req.destroy(new Error('Request timed out after ' + TIMEOUT_MS + 'ms')));
            });
          }

          (async () => {
            function readExisting() {
              if (!fs.existsSync(OUT_PATH)) return null;
              try { return JSON.parse(fs.readFileSync(OUT_PATH, 'utf8')); } catch (_) { return null; }
            }
            function contentEqual(a, b) {
              if (!a || !b) return false;
              if (a.severity !== b.severity) return false;
              if (a.statusLabel !== b.statusLabel) return false;
              if (JSON.stringify(a.parseError) !== JSON.stringify(b.parseError)) return false;
              return true;
            }
            const existing = readExisting();

            try {
              console.log('--- Checking', TARGET_URL);
              const res = await fetchUrl(TARGET_URL);
              console.log('  Status:', res.status, '  Body length:', res.body.length);

              let severity, statusLabel, statusDetail;

              if (res.error) {
                severity = 'partial';
                statusLabel = 'Unreachable';
                statusDetail = res.error;
              } else if (res.status >= 500) {
                severity = 'partial';
                statusLabel = 'Server error';
                statusDetail = 'HTTP ' + res.status;
              } else if (res.status >= 400) {
                severity = 'partial';
                statusLabel = 'Login broken';
                statusDetail = 'HTTP ' + res.status;
              } else if (!res.body.includes(VERIFY_STRING)) {
                severity = 'degraded';
                statusLabel = 'Unexpected page content';
                statusDetail = 'RJHS tenant marker missing from response — tenant may be misconfigured or replaced';
              } else {
                severity = 'operational';
                statusLabel = 'Operating normally';
                statusDetail = null;
              }

              console.log('--- Severity:', severity, '-', statusLabel);

              const now = new Date().toISOString();
              const newContent = {
                source: 'synthetic-check',
                target: TARGET_URL,
                severity,
                statusLabel,
                statusDetail,
                parseError: null,
                lastSuccessfulParse: now
              };

              if (contentEqual(newContent, existing)) {
                console.log('No content change — skipping write.');
                return;
              }

              const snapshot = { fetchedAt: now, ...newContent };
              fs.writeFileSync(OUT_PATH, JSON.stringify(snapshot, null, 2) + '\n');
              console.log('Wrote', OUT_PATH);
              console.log(JSON.stringify(snapshot, null, 2));
            } catch (err) {
              console.error('Workflow harness failed:', err.message);
              const now = new Date().toISOString();
              const lastGood = existing || {};
              const newContent = {
                source: 'synthetic-check',
                target: TARGET_URL,
                severity: lastGood.severity || 'unknown',
                statusLabel: lastGood.statusLabel || null,
                statusDetail: lastGood.statusDetail || null,
                parseError: {
                  message: err.message,
                  firstFailedAt: (lastGood.parseError && lastGood.parseError.firstFailedAt) || now
                },
                lastSuccessfulParse: lastGood.lastSuccessfulParse || null
              };
              if (contentEqual(newContent, existing)) {
                console.log('Workflow still failing with same error — skipping write.');
                return;
              }
              const snapshot = { fetchedAt: now, ...newContent };
              fs.writeFileSync(OUT_PATH, JSON.stringify(snapshot, null, 2) + '\n');
              console.log('Wrote breakage snapshot to', OUT_PATH);
            }
          })();
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add myrj.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update MyRJ status snapshot [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push failed (attempt $i) — pulling and retrying"
            git pull --rebase origin main
            sleep $((RANDOM % 5 + 1))
          done
          echo "::error::Failed to push after 5 attempts"
          exit 1

      - name: Fail run if scraper harness is broken
        run: |
          if [ -f myrj.json ] && grep -q '"parseError": {' myrj.json; then
            echo "::error::MyRJ scraper harness failed."
            cat myrj.json
            exit 1
          fi
          echo "MyRJ scraper succeeded."
