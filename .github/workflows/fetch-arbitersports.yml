name: Fetch ArbiterSports status

on:
  schedule:
    # Every 5 minutes. GitHub may delay scheduled runs during high load,
    # so actual cadence can be 5-15 minutes — fine for our purposes.
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual runs from the Actions tab

permissions:
  contents: write  # Needed to commit the updated JSON file

jobs:
  fetch-arbitersports:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and parse ArbiterSports Pingdom status page
        run: |
          node <<'EOF'
          const http = require('http');
          const fs = require('fs');

          // ArbiterSports publishes its own status page hosted by Pingdom at
          // http://status.arbitersports.com/. The page itself is a static HTML
          // shell — the actual check data is loaded via AJAX from the /checks
          // endpoint on the same origin. We hit /checks directly and parse
          // the jQuery dataTables JSON response.
          //
          // ArbiterSports tracks five services in their public Pingdom page,
          // but RJ only uses four of them. We filter to those and ignore
          // ArbiterPay entirely:
          //   - ArbiterLive
          //   - ArbiterSports
          //   - ArbiterSports Login Services
          //   - Student Registration
          //
          // Pingdom uses four status states (per the icon legend in the page
          // HTML and confirmed by the rendered page):
          //   green  = service operating normally    (>= 99.90% uptime)
          //   yellow = service disruption            (98.00-99.89% uptime)
          //   red    = service outage                (<  98.00% uptime)
          //   grey   = no data / unmonitored
          //
          // We map per-service to dashboard severity:
          //   green  -> operational
          //   yellow -> degraded
          //   red    -> partial   <-- capped here, NOT 'major'
          //   grey   -> unknown
          //
          // The 'partial' ceiling is deliberate. Pingdom's red is authoritative
          // (vendor-monitored, not crowdsourced), but ArbiterSports outages
          // affect athletics scheduling — important but not school-day-blocking
          // in the way Canvas/Blackbaud outages are. Reserving 'major' (red)
          // for those events keeps the dashboard's color language meaningful.
          // The expand section in the dashboard surfaces the per-service
          // breakdown so the AD can see exactly what's affected.
          const CHECKS_URL = 'http://status.arbitersports.com/checks';
          const PAGE_URL = 'http://status.arbitersports.com/';
          const OUT_PATH = 'arbitersports.json';

          // Services we actually use. Tile severity = worst across these only.
          // ArbiterPay is in the Pingdom page but not in this list — it's
          // intentionally excluded.
          const TRACKED_SERVICES = [
            'ArbiterLive',
            'ArbiterSports',
            'ArbiterSports Login Services',
            'Student Registration'
          ];

          // Severity ranking for "worst of" comparisons. Higher = worse.
          const SEVERITY_RANK = {
            operational: 0,
            unknown:     1,  // grey: no data — surface but don't escalate
            degraded:    2,
            partial:     3
          };

          function fetchUrl(url) {
            return new Promise((resolve, reject) => {
              // Using HTTP not HTTPS because that's the protocol the Pingdom
              // page uses (note the http:// in dataTableOptions['sAjaxSource']
              // when rendered same-origin). If they ever switch to HTTPS this
              // will break — the workflow's failure-state snapshot makes that
              // visible in the dashboard so we'll see it.
              const opts = {
                headers: {
                  // Generic UA — Pingdom doesn't block scrapers, this is just
                  // identifying ourselves honestly.
                  'User-Agent': 'rjedtech-status-dashboard',
                  'Accept': 'application/json, text/javascript, */*; q=0.01',
                  // dataTables sets X-Requested-With for AJAX calls; including
                  // it makes our request look like the page's own JS calls.
                  'X-Requested-With': 'XMLHttpRequest',
                  'Referer': PAGE_URL
                }
              };
              http.get(url, opts, (res) => {
                if (res.statusCode !== 200) {
                  reject(new Error('HTTP ' + res.statusCode));
                  return;
                }
                let body = '';
                res.on('data', (chunk) => body += chunk);
                res.on('end', () => resolve(body));
              }).on('error', reject);
            });
          }

          // Pingdom's /checks endpoint returns a jQuery dataTables-shaped JSON
          // object. The rows live under aaData (dataTables 1.10 convention)
          // and each row is an array of cell HTML fragments matching the
          // column definitions in the page:
          //   [0] status icon HTML       (e.g. '<span class="iconSmall green"></span>' or similar)
          //   [1] name cell HTML         (e.g. '<a href="..."><strong>ArbiterLive</strong></a>')
          //   [2..8] day1..day7 HTML     (small icons per day)
          //
          // We extract the status from cell 0 (current state) and the name
          // from cell 1 (to identify which service it is). The 7-day cells
          // aren't used — we only care about current state for the dashboard.
          function parseChecksResponse(rawJson) {
            let data;
            try {
              data = JSON.parse(rawJson);
            } catch (e) {
              throw new Error('Response is not valid JSON: ' + e.message + ' (first 200 chars: ' + rawJson.slice(0, 200) + ')');
            }

            // dataTables can use either aaData (1.10 legacy) or data (1.10+).
            // Try both.
            const rows = data.aaData || data.data;
            if (!Array.isArray(rows)) {
              throw new Error('Response did not contain aaData or data array. Keys: ' + Object.keys(data).join(','));
            }

            const services = [];
            for (const row of rows) {
              if (!Array.isArray(row) || row.length < 2) {
                console.warn('Skipping malformed row:', JSON.stringify(row));
                continue;
              }

              // Status icon: look for green/yellow/red/grey class names.
              // The class might be on a span, div, or img — we just look
              // at the HTML string for any of those keywords.
              const statusHtml = String(row[0] || '');
              let color = null;
              if (/\bgreen\b/i.test(statusHtml))       color = 'green';
              else if (/\byellow\b/i.test(statusHtml)) color = 'yellow';
              else if (/\bred\b/i.test(statusHtml))    color = 'red';
              else if (/\bgrey\b|\bgray\b/i.test(statusHtml)) color = 'grey';

              // Name: strip HTML tags from cell 1 and trim
              const nameHtml = String(row[1] || '');
              const name = nameHtml.replace(/<[^>]+>/g, '').replace(/&amp;/g, '&').trim();

              if (!name) {
                console.warn('Skipping row with no parseable name:', JSON.stringify(row));
                continue;
              }

              services.push({ name, color, statusHtml: statusHtml.slice(0, 200) });
            }

            if (services.length === 0) {
              throw new Error('Parsed zero services from response — DataTables format may have changed.');
            }

            return services;
          }

          function colorToSeverity(color) {
            switch (color) {
              case 'green':  return 'operational';
              case 'yellow': return 'degraded';
              case 'red':    return 'partial';   // capped intentionally — see header comment
              case 'grey':   return 'unknown';
              default:       return 'unknown';
            }
          }

          function colorToLabel(color) {
            switch (color) {
              case 'green':  return 'Operating normally';
              case 'yellow': return 'Service disruption';
              case 'red':    return 'Service outage';
              case 'grey':   return 'No data';
              default:       return 'Unknown';
            }
          }

          (async () => {
            function readExisting() {
              if (!fs.existsSync(OUT_PATH)) return null;
              try {
                return JSON.parse(fs.readFileSync(OUT_PATH, 'utf8'));
              } catch (_) {
                return null;
              }
            }

            // Compare meaningful content, ignoring volatile timestamps
            function contentEqual(a, b) {
              if (!a || !b) return false;
              if (a.severity !== b.severity) return false;
              if (JSON.stringify(a.services) !== JSON.stringify(b.services)) return false;
              if (JSON.stringify(a.parseError) !== JSON.stringify(b.parseError)) return false;
              return true;
            }

            const existing = readExisting();

            try {
              const rawJson = await fetchUrl(CHECKS_URL);
              const parsed = parseChecksResponse(rawJson);

              // Filter to services we actually use
              const trackedServices = TRACKED_SERVICES.map((trackedName) => {
                const found = parsed.find((s) => s.name === trackedName);
                if (!found) {
                  // Service is in our list but Pingdom didn't return it —
                  // surface as 'unknown' so we notice if Pingdom drops it
                  return { name: trackedName, severity: 'unknown', label: 'Not reported' };
                }
                return {
                  name: trackedName,
                  severity: colorToSeverity(found.color),
                  label: colorToLabel(found.color)
                };
              });

              // Roll up to worst-of: highest severity wins.
              const worstSeverity = trackedServices.reduce((worst, s) => {
                const r = SEVERITY_RANK[s.severity] ?? 1;
                const wr = SEVERITY_RANK[worst] ?? 0;
                return r > wr ? s.severity : worst;
              }, 'operational');

              // Log all services we saw, including untracked ones, for debugging
              console.log('All services from Pingdom:');
              for (const s of parsed) {
                const tracked = TRACKED_SERVICES.includes(s.name) ? '[TRACKED]' : '[ignored]';
                console.log(`  ${tracked} ${s.name}: ${s.color || 'unknown'}`);
              }

              const now = new Date().toISOString();
              const newContent = {
                source: PAGE_URL,
                severity: worstSeverity,
                services: trackedServices,
                parseError: null,
                lastSuccessfulParse: now
              };

              if (contentEqual(newContent, existing)) {
                console.log('No content change — skipping write. Roll-up severity:', worstSeverity);
                return;
              }

              const snapshot = { fetchedAt: now, ...newContent };
              fs.writeFileSync(OUT_PATH, JSON.stringify(snapshot, null, 2) + '\n');
              console.log('Status changed — wrote', OUT_PATH);
              console.log(JSON.stringify(snapshot, null, 2));

            } catch (err) {
              console.error('Failed to fetch/parse Pingdom checks endpoint:', err.message);

              const now = new Date().toISOString();
              const lastGood = existing || {};
              const newContent = {
                source: PAGE_URL,
                severity: lastGood.severity || 'unknown',
                services: lastGood.services || null,
                parseError: {
                  message: err.message,
                  firstFailedAt: (lastGood.parseError && lastGood.parseError.firstFailedAt) || now
                },
                lastSuccessfulParse: lastGood.lastSuccessfulParse || null
              };

              // Only commit if breakage state itself changed
              if (contentEqual(newContent, existing)) {
                console.log('Parse still failing with same error — skipping write.');
                return;
              }

              const snapshot = { fetchedAt: now, ...newContent };
              fs.writeFileSync(OUT_PATH, JSON.stringify(snapshot, null, 2) + '\n');
              console.log('Wrote breakage snapshot to', OUT_PATH);
              console.log(JSON.stringify(snapshot, null, 2));
            }
          })();
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add arbitersports.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update ArbiterSports status snapshot [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push failed (attempt $i) — pulling and retrying"
            git pull --rebase origin main
            sleep $((RANDOM % 5 + 1))
          done
          echo "::error::Failed to push after 5 attempts"
          exit 1

      - name: Fail run if scraper is broken
        # Surface scraper breakage as a red Actions run so we notice via
        # GitHub's UI even though we wrote the breakage state cleanly.
        run: |
          if [ -f arbitersports.json ] && grep -q '"parseError": {' arbitersports.json; then
            echo "::error::ArbiterSports scraper failed to parse the page. See arbitersports.json for details."
            cat arbitersports.json
            exit 1
          fi
          echo "ArbiterSports scraper succeeded."
