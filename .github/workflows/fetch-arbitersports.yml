name: Fetch ArbiterSports status

on:
  schedule:
    # Every 5 minutes. GitHub may delay scheduled runs during high load,
    # so actual cadence can be 5-15 minutes — fine for our purposes.
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual runs from the Actions tab

permissions:
  contents: write  # Needed to commit the updated JSON file

jobs:
  fetch-arbitersports:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run dual synthetic check (login flow + application)
        run: |
          node <<'EOF'
          const https = require('https');
          const fs = require('fs');
          const { URL } = require('url');

          // ArbiterSports doesn't publish a usable status page (Pingdom's /checks
          // endpoint blocks unauthenticated access; Downdetector blocks GitHub
          // runner IPs with HTTP 403). Instead, we run synthetic checks against
          // the two URLs that matter for the athletic department's actual
          // workflow:
          //
          //   1. Login flow:  https://go.arbitersports.com/
          //      Microsoft Entra External ID (B2C) sign-in page. Confirms the
          //      tenant can broker authentication. We verify the response
          //      contains "arbitersportsb2c.onmicrosoft.com" — the B2C tenant
          //      identifier, which is stable and won't change with redesigns.
          //
          //   2. Application: https://www1.arbitersports.com/ArbiterGame/Schedule
          //      The actual ArbiterGame app. Anonymous visitors get redirected
          //      to the login flow (302 -> go.arbitersports.com). We follow
          //      redirects and verify any non-5xx final response. The redirect
          //      itself is healthy behavior — we just want to confirm the
          //      app server is alive and routing correctly.
          //
          // What this catches:
          //   - DNS / CDN failures on either domain
          //   - SSL / TLS expiry
          //   - 5xx errors from either tier
          //   - Microsoft B2C tenant misconfiguration (login page wouldn't
          //     contain the expected tenant string)
          //
          // What this misses:
          //   - Per-feature bugs inside the app post-login
          //   - ArbiterPay (out of scope per RJ usage)
          //   - Specific service breakdowns (the Pingdom page would have shown
          //     ArbiterLive/ArbiterSports/Login Services/Student Registration
          //     separately, but that endpoint is unauthenticated-blocked)
          //
          // Severity ceiling: 'partial' (orange) for any failure. Athletics
          // outages matter — Saturday games are real — but they're not
          // school-day-blocking the way Canvas/Blackbaud outages are. Reserving
          // 'major' (red) for those keeps the dashboard's color language clear.
          // Per-check status is broken out into the tile's expand section so
          // the AD can see which layer (login or app) is affected.

          const LOGIN_URL = 'https://go.arbitersports.com/';
          const APP_URL = 'https://www1.arbitersports.com/ArbiterGame/Schedule';
          const LOGIN_VERIFY_STRING = 'arbitersportsb2c.onmicrosoft.com';
          const OUT_PATH = 'arbitersports.json';
          const TIMEOUT_MS = 15000;
          const MAX_REDIRECTS = 5;
          const USER_AGENT = 'rjedtech-status-dashboard (https://rjedtech.github.io/EdTech-Status/)';

          // Severity ranking for "worst of" comparisons. Higher = worse.
          const SEVERITY_RANK = {
            operational: 0,
            unknown:     1,
            degraded:    2,
            partial:     3
          };

          // GET a URL, optionally following redirects. Returns:
          //   { ok, status, body, error, redirectChain }
          // - ok = true if final response was 2xx or 3xx (including expected redirects)
          // - status = final HTTP status code (after redirects)
          // - body = response body as string (may be truncated)
          // - error = error message if request failed entirely
          // - redirectChain = list of URLs visited (useful for debug logs)
          function fetchUrl(targetUrl, { followRedirects = false, redirectsRemaining = MAX_REDIRECTS, redirectChain = [] } = {}) {
            return new Promise((resolve) => {
              redirectChain = [...redirectChain, targetUrl];

              let parsedUrl;
              try {
                parsedUrl = new URL(targetUrl);
              } catch (err) {
                resolve({ ok: false, status: 0, body: '', error: 'Invalid URL: ' + err.message, redirectChain });
                return;
              }

              const opts = {
                method: 'GET',
                headers: {
                  'User-Agent': USER_AGENT,
                  'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                  'Accept-Language': 'en-US,en;q=0.9'
                },
                timeout: TIMEOUT_MS
              };

              const req = https.get(parsedUrl, opts, (res) => {
                // Handle redirects
                if (followRedirects && [301, 302, 303, 307, 308].includes(res.statusCode)) {
                  if (redirectsRemaining <= 0) {
                    resolve({
                      ok: false,
                      status: res.statusCode,
                      body: '',
                      error: 'Exceeded maximum redirects (' + MAX_REDIRECTS + ')',
                      redirectChain
                    });
                    return;
                  }
                  const location = res.headers.location;
                  if (!location) {
                    resolve({
                      ok: false,
                      status: res.statusCode,
                      body: '',
                      error: 'Redirect with no Location header',
                      redirectChain
                    });
                    return;
                  }
                  // Resolve relative redirects against the current URL
                  const nextUrl = new URL(location, targetUrl).toString();
                  res.resume(); // discard body before recursing
                  resolve(fetchUrl(nextUrl, {
                    followRedirects: true,
                    redirectsRemaining: redirectsRemaining - 1,
                    redirectChain
                  }));
                  return;
                }

                let body = '';
                let bytesRead = 0;
                const MAX_BODY = 200000; // 200KB cap — enough to find verify strings
                res.on('data', (chunk) => {
                  bytesRead += chunk.length;
                  if (body.length < MAX_BODY) {
                    body += chunk.toString('utf8');
                    if (body.length > MAX_BODY) body = body.slice(0, MAX_BODY);
                  }
                });
                res.on('end', () => {
                  resolve({
                    ok: res.statusCode >= 200 && res.statusCode < 400,
                    status: res.statusCode,
                    body,
                    error: null,
                    redirectChain
                  });
                });
              });

              req.on('error', (err) => {
                resolve({ ok: false, status: 0, body: '', error: err.message, redirectChain });
              });

              req.on('timeout', () => {
                req.destroy(new Error('Request timed out after ' + TIMEOUT_MS + 'ms'));
              });
            });
          }

          // Run the login flow check.
          // Healthy = 200 with the B2C tenant string in the body.
          async function checkLogin() {
            console.log('--- Checking login flow at', LOGIN_URL);
            const res = await fetchUrl(LOGIN_URL, { followRedirects: true });
            console.log('  Status:', res.status, 'Redirects:', res.redirectChain.join(' -> '));

            if (res.error) {
              return {
                name: 'Login flow',
                severity: 'partial',
                label: 'Unreachable',
                detail: res.error
              };
            }
            if (res.status >= 500) {
              return {
                name: 'Login flow',
                severity: 'partial',
                label: 'Server error',
                detail: 'HTTP ' + res.status
              };
            }
            if (res.status >= 400) {
              return {
                name: 'Login flow',
                severity: 'partial',
                label: 'Login page broken',
                detail: 'HTTP ' + res.status
              };
            }
            if (!res.body.includes(LOGIN_VERIFY_STRING)) {
              return {
                name: 'Login flow',
                severity: 'degraded',
                label: 'Unexpected page content',
                detail: 'Expected B2C tenant identifier missing from response — login page may be misconfigured or replaced.'
              };
            }
            return {
              name: 'Login flow',
              severity: 'operational',
              label: 'Operating normally',
              detail: null
            };
          }

          // Run the application check.
          // Healthy = any non-5xx response after redirect chain. The app
          // server is expected to redirect anonymous visitors to login —
          // that redirect itself is the sign of health.
          async function checkApp() {
            console.log('--- Checking application at', APP_URL);
            const res = await fetchUrl(APP_URL, { followRedirects: true });
            console.log('  Status:', res.status, 'Redirects:', res.redirectChain.join(' -> '));

            if (res.error) {
              return {
                name: 'Application',
                severity: 'partial',
                label: 'Unreachable',
                detail: res.error
              };
            }
            if (res.status >= 500) {
              return {
                name: 'Application',
                severity: 'partial',
                label: 'Server error',
                detail: 'HTTP ' + res.status
              };
            }
            // 4xx is unusual on the redirect path but not necessarily fatal —
            // surface as degraded so we click through and check.
            if (res.status >= 400) {
              return {
                name: 'Application',
                severity: 'degraded',
                label: 'Unexpected response',
                detail: 'HTTP ' + res.status
              };
            }
            return {
              name: 'Application',
              severity: 'operational',
              label: 'Operating normally',
              detail: null
            };
          }

          (async () => {
            function readExisting() {
              if (!fs.existsSync(OUT_PATH)) return null;
              try {
                return JSON.parse(fs.readFileSync(OUT_PATH, 'utf8'));
              } catch (_) {
                return null;
              }
            }

            // Compare meaningful content, ignoring volatile timestamps
            function contentEqual(a, b) {
              if (!a || !b) return false;
              if (a.severity !== b.severity) return false;
              if (JSON.stringify(a.services) !== JSON.stringify(b.services)) return false;
              if (JSON.stringify(a.parseError) !== JSON.stringify(b.parseError)) return false;
              return true;
            }

            const existing = readExisting();

            try {
              const [loginResult, appResult] = await Promise.all([checkLogin(), checkApp()]);
              const services = [loginResult, appResult];

              // Roll up to worst-of severity for the tile color
              const worstSeverity = services.reduce((worst, s) => {
                const r = SEVERITY_RANK[s.severity] ?? 1;
                const wr = SEVERITY_RANK[worst] ?? 0;
                return r > wr ? s.severity : worst;
              }, 'operational');

              console.log('--- Roll-up severity:', worstSeverity);

              const now = new Date().toISOString();
              const newContent = {
                source: 'synthetic-check',
                severity: worstSeverity,
                services,
                parseError: null,
                lastSuccessfulParse: now
              };

              if (contentEqual(newContent, existing)) {
                console.log('No content change — skipping write.');
                return;
              }

              const snapshot = { fetchedAt: now, ...newContent };
              fs.writeFileSync(OUT_PATH, JSON.stringify(snapshot, null, 2) + '\n');
              console.log('Status changed — wrote', OUT_PATH);
              console.log(JSON.stringify(snapshot, null, 2));

            } catch (err) {
              // Catastrophic failure — neither check completed at all (rare,
              // would mean the workflow harness itself broke).
              console.error('Workflow harness failed:', err.message);

              const now = new Date().toISOString();
              const lastGood = existing || {};
              const newContent = {
                source: 'synthetic-check',
                severity: lastGood.severity || 'unknown',
                services: lastGood.services || null,
                parseError: {
                  message: err.message,
                  firstFailedAt: (lastGood.parseError && lastGood.parseError.firstFailedAt) || now
                },
                lastSuccessfulParse: lastGood.lastSuccessfulParse || null
              };

              if (contentEqual(newContent, existing)) {
                console.log('Workflow still failing with same error — skipping write.');
                return;
              }

              const snapshot = { fetchedAt: now, ...newContent };
              fs.writeFileSync(OUT_PATH, JSON.stringify(snapshot, null, 2) + '\n');
              console.log('Wrote breakage snapshot to', OUT_PATH);
            }
          })();
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add arbitersports.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update ArbiterSports status snapshot [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push failed (attempt $i) — pulling and retrying"
            git pull --rebase origin main
            sleep $((RANDOM % 5 + 1))
          done
          echo "::error::Failed to push after 5 attempts"
          exit 1

      - name: Fail run if scraper harness is broken
        # Surface harness breakage (NOT individual check failures) as a red
        # Actions run. Individual check failures (e.g. login down but app up)
        # are normal data and write a clean snapshot. Only set the workflow
        # red when the workflow itself couldn't complete.
        run: |
          if [ -f arbitersports.json ] && grep -q '"parseError": {' arbitersports.json; then
            echo "::error::ArbiterSports scraper harness failed. See arbitersports.json for details."
            cat arbitersports.json
            exit 1
          fi
          echo "ArbiterSports scraper succeeded."
