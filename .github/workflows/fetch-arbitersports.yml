name: Fetch ArbiterSports status

on:
  schedule:
    # Every 5 minutes. GitHub may delay scheduled runs during high load,
    # so actual cadence can be 5-15 minutes — fine for our purposes.
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual runs from the Actions tab

permissions:
  contents: write  # Needed to commit the updated JSON file

jobs:
  fetch-arbitersports:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Synthetic checks on ArbiterSports login + application
        run: |
          node <<'EOF'
          const https = require('https');
          const fs = require('fs');
          const { URL } = require('url');

          // ArbiterSports publishes no usable status page — Pingdom's /checks
          // endpoint blocks unauthenticated access, and Downdetector 403s GitHub
          // runner IPs (that was the old, broken approach). Instead we run two
          // synthetic HTTP checks that together model the AD's real workflow —
          // "can I sign in AND reach the schedule?" — and both must be healthy:
          //   1. Login flow:  go.arbitersports.com        (Microsoft B2C tenant)
          //   2. Application: www1.arbitersports.com/ArbiterGame/Schedule
          //
          // The tile rolls up worst-of; per-check status surfaces in the expand
          // (index.html reads the `services` array below).
          //
          // Severity ceiling is 'partial' (orange) for ANY check failure. When
          // ArbiterSports is down the AD's workaround is manual scheduling —
          // friction, not a full stoppage — so we don't ring the 'major' alarm.
          //
          // Limitation (same as the rest of the dashboard): this runs from
          // GitHub's runners, so it catches vendor-side outages, not an
          // RJ-network or Securly issue. And unauthenticated GETs can't verify
          // post-login application health — only that each layer is reachable.
          const TARGETS = [
            { name: 'Login flow',  url: 'https://go.arbitersports.com/' },
            { name: 'Application', url: 'https://www1.arbitersports.com/ArbiterGame/Schedule' },
          ];
          const OUT_PATH      = 'arbitersports.json';
          const ATTEMPTS      = 3;      // best-of, to dampen single-request runner blips
          const TIMEOUT_MS    = 15000;  // per attempt
          const MAX_REDIRECTS = 5;
          // Browser-like UA on purpose: a bot-ish UA risks a CDN 403 that would
          // look like an outage when it isn't.
          const UA = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 ' +
                     '(KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36';

          // One HTTP probe following redirects. Resolves { ok, status } on any
          // HTTP response, or { ok:false, status:0, error } on network failure /
          // timeout. We only need the status line, so we tear the socket down
          // immediately rather than downloading the body.
          function probeOnce(targetUrl, redirectsLeft) {
            return new Promise((resolve) => {
              let parsed;
              try { parsed = new URL(targetUrl); }
              catch (e) { resolve({ ok: false, status: 0, error: 'Invalid URL: ' + e.message }); return; }

              const req = https.get(parsed, {
                headers: {
                  'User-Agent': UA,
                  'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                  'Accept-Language': 'en-US,en;q=0.9'
                },
                timeout: TIMEOUT_MS
              }, (res) => {
                const status = res.statusCode;
                if (status >= 300 && status < 400 && res.headers.location && redirectsLeft > 0) {
                  res.destroy();
                  let next;
                  try { next = new URL(res.headers.location, targetUrl).toString(); }
                  catch (e) { resolve({ ok: true, status }); return; } // malformed redirect; report 3xx as-is
                  resolve(probeOnce(next, redirectsLeft - 1));
                  return;
                }
                res.destroy();
                resolve({ ok: status >= 200 && status < 400, status });
              });
              req.on('error', (err) => resolve({ ok: false, status: 0, error: err.message }));
              req.on('timeout', () => req.destroy(new Error('timeout after ' + TIMEOUT_MS + 'ms')));
            });
          }

          // Classify one completed probe into { severity, label, detail }.
          // Ceiling is 'partial' — no path returns 'major'.
          function classify(result) {
            if (result.error)        return { severity: 'partial',     label: 'Unreachable',        detail: result.error };
            const s = result.status;
            if (s >= 200 && s < 400) return { severity: 'operational', label: 'Operating normally', detail: null };
            if (s >= 500)            return { severity: 'partial',     label: 'Server error',       detail: 'HTTP ' + s };
            return { severity: 'partial', label: 'Unexpected response', detail: 'HTTP ' + s }; // 4xx after redirects
          }

          // Best-of ranking (lower = healthier). ANY reachable reading beats a failure.
          const RANK = { operational: 0, degraded: 1, partial: 2 };
          function rank(o) { return RANK[o.severity] != null ? RANK[o.severity] : 2; }

          async function probeTarget(t) {
            const outcomes = [];
            for (let i = 0; i < ATTEMPTS; i++) {
              outcomes.push(classify(await probeOnce(t.url, MAX_REDIRECTS)));
            }
            outcomes.sort((a, b) => rank(a) - rank(b));
            const best = outcomes[0];
            return { name: t.name, severity: best.severity, label: best.label, detail: best.detail };
          }

          function rollup(services) {
            let worst = 'operational';
            for (const s of services) if (rank(s) > rank({ severity: worst })) worst = s.severity;
            return worst;
          }

          function readExisting() {
            if (!fs.existsSync(OUT_PATH)) return null;
            try { return JSON.parse(fs.readFileSync(OUT_PATH, 'utf8')); } catch (_) { return null; }
          }

          // Only material fields decide whether we write — timestamps are
          // bookkeeping, so we don't commit every 5 minutes when nothing changed.
          function contentEqual(a, b) {
            if (!a || !b) return false;
            return a.severity === b.severity
                && JSON.stringify(a.services) === JSON.stringify(b.services)
                && JSON.stringify(a.parseError) === JSON.stringify(b.parseError);
          }

          (async () => {
            const existing = readExisting();
            const SOURCE = 'synthetic-check (go.arbitersports.com + www1.arbitersports.com)';
            try {
              const services = [];
              for (const t of TARGETS) services.push(await probeTarget(t));
              const severity = rollup(services);
              const now = new Date().toISOString();

              console.log('--- ArbiterSports checks:');
              for (const s of services) console.log('    ' + s.name + ': ' + s.severity + ' (' + s.label + (s.detail ? ' — ' + s.detail : '') + ')');
              console.log('--- Rollup severity:', severity);

              const newContent = {
                source: SOURCE,
                severity,
                services,
                parseError: null,
                lastSuccessfulParse: now
              };

              if (contentEqual(newContent, existing)) {
                console.log('No material change — skipping write.');
                return;
              }
              const snapshot = { fetchedAt: now, ...newContent };
              fs.writeFileSync(OUT_PATH, JSON.stringify(snapshot, null, 2) + '\n');
              console.log('Wrote', OUT_PATH);
              console.log(JSON.stringify(snapshot, null, 2));
            } catch (err) {
              // Harness itself threw (not a vendor outage — those are 'partial'
              // above). Preserve last-good and layer parseError so the dashboard
              // flags OUR breakage while still showing the last valid reading.
              console.error('ArbiterSports probe harness failed:', err.message);
              const now = new Date().toISOString();
              const lastGood = existing || {};
              const newContent = {
                source: SOURCE,
                severity: lastGood.severity || 'unknown',
                services: lastGood.services || [],
                parseError: {
                  message: err.message,
                  firstFailedAt: (lastGood.parseError && lastGood.parseError.firstFailedAt) || now
                },
                lastSuccessfulParse: lastGood.lastSuccessfulParse || null
              };
              if (contentEqual(newContent, existing)) {
                console.log('Harness still failing with same error — skipping write.');
                return;
              }
              const snapshot = { fetchedAt: now, ...newContent };
              fs.writeFileSync(OUT_PATH, JSON.stringify(snapshot, null, 2) + '\n');
              console.log('Wrote breakage snapshot to', OUT_PATH);
              console.log(JSON.stringify(snapshot, null, 2));
            }
          })();
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add arbitersports.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update ArbiterSports status snapshot [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push failed (attempt $i) — pulling and retrying"
            git pull --rebase origin main
            sleep $((RANDOM % 5 + 1))
          done
          echo "::error::Failed to push after 5 attempts"
          exit 1

      - name: Fail run if probe harness is broken
        # Red only when OUR probe harness threw (recorded as parseError). A real
        # ArbiterSports outage is a normal detected state (severity "partial")
        # and deliberately does NOT fail the run.
        run: |
          if [ -f arbitersports.json ] && grep -q '"parseError": {' arbitersports.json; then
            echo "::error::ArbiterSports probe harness failed. See arbitersports.json for details."
            cat arbitersports.json
            exit 1
          fi
          echo "ArbiterSports probe OK."
