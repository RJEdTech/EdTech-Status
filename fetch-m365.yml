name: Fetch Microsoft 365 status

on:
  schedule:
    # Every 5 minutes. GitHub may delay scheduled runs during high load,
    # so actual cadence can be 5-15 minutes — fine for our purposes.
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual runs from the Actions tab

permissions:
  contents: write  # Needed to commit the updated JSON file

jobs:
  fetch-m365:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and parse M365 RSS
        run: |
          node <<'EOF'
          const https = require('https');
          const fs = require('fs');

          const FEED_URL = 'https://status.cloud.microsoft/feed/rss';
          const OUT_PATH = 'm365.json';

          function fetchUrl(url) {
            return new Promise((resolve, reject) => {
              https.get(url, { headers: { 'User-Agent': 'rjedtech-status-dashboard' } }, (res) => {
                if (res.statusCode !== 200) {
                  reject(new Error('HTTP ' + res.statusCode));
                  return;
                }
                let body = '';
                res.on('data', (chunk) => body += chunk);
                res.on('end', () => resolve(body));
              }).on('error', reject);
            });
          }

          // Tiny, dependency-free RSS parser. Microsoft's feed is simple and
          // stable enough that string extraction is fine — no need for an XML lib.
          function extractTag(xml, tag) {
            const re = new RegExp('<' + tag + '[^>]*>([\\s\\S]*?)<\\/' + tag + '>', 'i');
            const m = xml.match(re);
            return m ? m[1].trim() : '';
          }

          function extractAllItems(xml) {
            const items = [];
            const re = /<item[^>]*>([\s\S]*?)<\/item>/gi;
            let m;
            while ((m = re.exec(xml)) !== null) {
              items.push(m[1]);
            }
            return items;
          }

          (async () => {
            // Helper: read existing snapshot if present
            function readExisting() {
              if (!fs.existsSync(OUT_PATH)) return null;
              try {
                return JSON.parse(fs.readFileSync(OUT_PATH, 'utf8'));
              } catch (_) {
                return null;
              }
            }

            // Helper: compare two objects' content fields (ignoring volatile timestamps)
            function contentEqual(a, b) {
              if (!a || !b) return false;
              const fields = ['source', 'status', 'title', 'pubDate', 'itemCount',
                              'parseError', 'lastSuccessfulParse'];
              return fields.every(f => JSON.stringify(a[f]) === JSON.stringify(b[f]));
            }

            const existing = readExisting();

            try {
              const xml = await fetchUrl(FEED_URL);
              const items = extractAllItems(xml);

              if (items.length === 0) {
                throw new Error('No <item> elements found in feed — Microsoft may have changed the feed structure.');
              }

              const firstItem = items[0];
              const status = extractTag(firstItem, 'status');
              const title = extractTag(firstItem, 'title');
              const pubDate = extractTag(firstItem, 'pubDate');

              // Defensive: status must be present and non-empty for us to trust the feed.
              if (!status) {
                throw new Error('First <item> missing <status> element — feed schema may have changed.');
              }

              const now = new Date().toISOString();
              const newContent = {
                source: FEED_URL,
                status: status,
                title: title || '',
                pubDate: pubDate || '',
                itemCount: items.length,
                parseError: null,            // explicitly cleared on success
                lastSuccessfulParse: now     // updated on every successful parse
              };

              if (contentEqual(newContent, existing)) {
                console.log('No content change — skipping write.');
                return;
              }

              const snapshot = { fetchedAt: now, ...newContent };
              fs.writeFileSync(OUT_PATH, JSON.stringify(snapshot, null, 2) + '\n');
              console.log('Status content changed — wrote', OUT_PATH);
              console.log(JSON.stringify(snapshot, null, 2));
            } catch (err) {
              // Don't lose the last-known status. Preserve everything from the last good
              // fetch and layer parseError on top so the dashboard can flag the breakage
              // while still showing the most recent valid reading.
              console.error('Failed to fetch/parse M365 RSS:', err.message);

              const now = new Date().toISOString();
              const lastGood = existing || {};
              const newContent = {
                source: FEED_URL,
                status: lastGood.status || 'Unknown',
                title: lastGood.title || '',
                pubDate: lastGood.pubDate || '',
                itemCount: lastGood.itemCount ?? 0,
                parseError: {
                  message: err.message,
                  firstFailedAt: (lastGood.parseError && lastGood.parseError.firstFailedAt) || now
                },
                lastSuccessfulParse: lastGood.lastSuccessfulParse || null
              };

              if (contentEqual(newContent, existing)) {
                console.log('Parse still failing with same error — skipping write.');
                return;
              }

              const snapshot = { fetchedAt: now, ...newContent };
              fs.writeFileSync(OUT_PATH, JSON.stringify(snapshot, null, 2) + '\n');
              console.log('Wrote breakage snapshot to', OUT_PATH);
              console.log(JSON.stringify(snapshot, null, 2));
            }
          })();
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add m365.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update M365 status snapshot [skip ci]"
            git push
          fi

      - name: Fail run if scraper is broken
        # This step exists so the GitHub Actions run shows red whenever the
        # scraper can't parse the feed, even though we wrote the breakage state
        # to JSON in a clean exit (so the commit step could run). The dashboard
        # surfaces breakage from the JSON; this step exists for GitHub-side alerting.
        run: |
          if [ -f m365.json ] && grep -q '"parseError": {' m365.json; then
            echo "::error::M365 scraper failed to parse the feed. See m365.json for details."
            cat m365.json
            exit 1
          fi
          echo "M365 scraper succeeded."
